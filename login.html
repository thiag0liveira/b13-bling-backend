<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>B13 Bebidas — Login</title>
<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
:root{--indigo:#262366;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:400px;text-align:center}
.logo{height:64px;margin-bottom:16px}
h1{font-size:22px;font-weight:900;margin-bottom:4px}
.sub{color:#9a95c9;font-size:13px;margin-bottom:24px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#9a95c9;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.field input{width:100%;padding:13px;border-radius:10px;border:2px solid var(--border);background:#0f0d24;color:#fff;font-size:15px;transition:.15s}
.field input:focus{outline:none;border-color:var(--mag)}
.btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--mag);color:#fff;font-size:16px;font-weight:900;cursor:pointer;margin-top:6px;transition:.15s}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5}
.err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;text-align:left}
.div-or{display:flex;align-items:center;gap:10px;margin:16px 0;color:#514c96;font-size:12px}
.div-or::before,.div-or::after{content:"";flex:1;height:1px;background:var(--border)}
.link-totem{display:block;padding:12px;border:2px solid var(--border);border-radius:10px;color:#9a95c9;text-decoration:none;font-size:14px;font-weight:700;transition:.15s}
.link-totem:hover{border-color:var(--mag);color:#fff}
</style>
</head>
<body>
<div class="box">
  <img class="logo" id="logoImg">
  <h1>B13 Bebidas</h1>
  <div class="sub">Sistema Operacional</div>
  <div class="field"><label>Login</label><input id="loginInp" placeholder="seu.login" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('senhaInp').focus()"></div>
  <div class="field"><label>Senha</label><input id="senhaInp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()"></div>
  <button class="btn" id="btnEntrar" onclick="entrar()">Entrar</button>
  <div id="errMsg"></div>
  <div class="div-or">ou</div>
  <a href="/pedir" class="link-totem">🛒 Ir para o Totem de Pedidos</a>
</div>
<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
document.getElementById("logoImg").src=LOGO;

// se já tem sessão, redireciona
try{ const s=sessionStorage.getItem("b13sess"); if(s){ const f=JSON.parse(s); if(f?.id) { irPara(f); } } }catch(e){}

function irPara(f){
  const next=new URLSearchParams(location.search).get("next");
  if(next&&next.startsWith("/")&&next!=="/login") { location.href=next; return; }
  // redireciona conforme permissões
  const p=f.permissoes||[f.nivel];
  const tem=a=>p.includes("admin")||p.includes(a);
  if(tem("ver_aguardando")||tem("ver_separacao")||tem("conferir")) { location.href="/operacional"; return; }
  location.href="/operacional";
}

async function entrar(){
  const login=document.getElementById("loginInp").value.trim();
  const senha=document.getElementById("senhaInp").value;
  const btn=document.getElementById("btnEntrar");
  const err=document.getElementById("errMsg");
  if(!login||!senha){ err.innerHTML=`<div class="err">Preencha login e senha</div>`; return; }
  btn.disabled=true; btn.textContent="Entrando…"; err.innerHTML="";
  try{
    const r=await fetch(B+"/api/funcionarios/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login,senha})});
    const j=await r.json();
    if(r.ok&&j.ok){
      sessionStorage.setItem("b13sess",JSON.stringify(j.funcionario));
      irPara(j.funcionario);
    } else {
      err.innerHTML=`<div class="err">❌ ${j.erro||"Login ou senha incorretos"}</div>`;
      btn.disabled=false; btn.textContent="Entrar";
      document.getElementById("senhaInp").value="";
      document.getElementById("senhaInp").focus();
    }
  }catch(e){ err.innerHTML=`<div class="err">Erro de conexão</div>`; btn.disabled=false; btn.textContent="Entrar"; }
}
document.getElementById("loginInp").focus();
</script>
</body>
</html>
