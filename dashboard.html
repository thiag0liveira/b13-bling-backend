<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>B13 — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
:root{--indigo:#262366;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
body{background:var(--bg);color:#fff;min-height:100vh}
.top{background:linear-gradient(180deg,#2b2870,var(--indigo));border-bottom:3px solid var(--mag);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.top img{height:36px}.top .t{font-weight:900;font-size:16px}.top .sp{flex:1}
.btn{border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:12px;padding:8px 12px;color:#fff;touch-action:manipulation}
.btn-mag{background:var(--mag)}.btn-ghost{background:#1c1846}.btn-out{background:transparent;border:2px solid #514c96}
.filtros{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#0d0b1e;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filtros input{padding:7px 10px;border-radius:8px;border:1px solid #514c96;background:#0f0d24;color:#fff;font-size:12px}
.chip-p{padding:6px 12px;border-radius:999px;border:2px solid #514c96;background:transparent;color:#9a95c9;font-size:12px;cursor:pointer;font-weight:700}
.chip-p.on{border-color:var(--mag);color:#fff;background:rgba(255,0,130,.1)}
.dash{padding:14px;display:grid;gap:14px}
/* seções */
.sec-title{font-weight:900;font-size:15px;color:#9a95c9;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}
/* cards KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--mag))}
.kpi .lb{font-size:11px;color:#9a95c9;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.kpi .vl{font-size:26px;font-weight:900;line-height:1}
.kpi .sub{font-size:11px;color:#9a95c9;margin-top:4px}
.kpi .ic{position:absolute;right:12px;top:12px;font-size:22px;opacity:.4}
/* gráficos */
.graf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.graf-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.graf-box h4{font-size:13px;font-weight:800;margin-bottom:12px;color:#9a95c9}
.graf-box canvas{max-height:220px}
/* tabela funcionários */
.ftable{width:100%;border-collapse:collapse;font-size:13px}
.ftable th{background:#0d0b1e;padding:8px 10px;text-align:left;font-size:11px;color:#9a95c9;font-weight:700;border-bottom:1px solid var(--border)}
.ftable td{padding:8px 10px;border-bottom:1px solid var(--border)}
.ftable tr:hover td{background:rgba(255,255,255,.03)}
.bar-inline{height:6px;border-radius:3px;background:var(--mag);display:inline-block;vertical-align:middle;margin-left:6px}
.badge-sm{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800}
.muted{color:#9a95c9;font-size:12px}
.ok{background:#183a2a;color:#a8f0c8;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700}
.err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:8px 12px;font-size:13px}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #514c96;border-top-color:var(--mag);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="/nav.js"></script>
<style>
  body.b13nav-open{ overflow:hidden }
  @media(min-width:900px){
    #b13nav{transform:translateX(0%) !important}
    #b13navOverlay{display:none !important}
    button[onclick="b13ToggleNav()"]{display:none !important}
    body > *:not(#b13nav):not([onclick="b13ToggleNav()"]):not(#b13navOverlay){ margin-left:200px }
  }
</style>
</head>
<body><script>
  (function(){
    if(!b13RequireLogin()) return;
    document.addEventListener("DOMContentLoaded",function(){
      const nav=document.createElement("div");
      nav.innerHTML=b13RenderNav("/dashboard");
      document.body.insertBefore(nav,document.body.firstChild);
    });
  })();
</script>
<div class="top">
  <img id="logoImg"><div class="t">Dashboard B13</div><div class="sp"></div>
  <a href="/operacional" class="btn btn-ghost" style="text-decoration:none">⬅ Operacional</a>
  <a href="/gestao" class="btn btn-out" style="text-decoration:none">Gestão</a>
</div>
<div class="filtros">
  <button class="chip-p on" onclick="setPeriodo('hoje',this)">Hoje</button>
  <button class="chip-p" onclick="setPeriodo('semana',this)">Esta semana</button>
  <button class="chip-p" onclick="setPeriodo('mes',this)">Este mês</button>
  <button class="chip-p" onclick="setPeriodo('custom',this)">Personalizado</button>
  <span id="customDates" style="display:none;gap:6px;align-items:center">
    <input type="date" id="dtDe"> até <input type="date" id="dtAte">
    <button class="btn btn-mag" onclick="carregar()">Aplicar</button>
  </span>
  <button class="btn btn-ghost" onclick="carregar()" style="margin-left:auto">↻ Atualizar</button>
  <span id="lastUpdate" class="muted"></span>
</div>
<div class="dash" id="dash"><div style="padding:40px;text-align:center"><div class="spin"></div><div class="muted" style="margin-top:10px">Carregando analytics…</div></div></div>

<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
document.getElementById("logoImg").src=LOGO;
const brl=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pct=v=>v!=null?v+"%":"—";
const min2str=m=>m==null?"—":m<60?Math.round(m)+"min":`${Math.floor(m/60)}h${Math.round(m%60)}min`;

let _periodo="hoje", _charts={};

function setPeriodo(p,el){
  _periodo=p;
  document.querySelectorAll(".chip-p").forEach(c=>c.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("customDates").style.display=p==="custom"?"flex":"none";
  if(p!=="custom") carregar();
}

function getPeriodoDates(){
  const hoje=new Date(); const fmt=d=>d.toISOString().slice(0,10);
  if(_periodo==="hoje") return {de:fmt(hoje),ate:fmt(hoje)};
  if(_periodo==="semana"){ const d=new Date(hoje); d.setDate(d.getDate()-6); return {de:fmt(d),ate:fmt(hoje)}; }
  if(_periodo==="mes"){ const d=new Date(hoje.getFullYear(),hoje.getMonth(),1); return {de:fmt(d),ate:fmt(hoje)}; }
  if(_periodo==="custom") return {de:document.getElementById("dtDe").value||fmt(hoje),ate:document.getElementById("dtAte").value||fmt(hoje)};
  return {de:fmt(hoje),ate:fmt(hoje)};
}

// destruir charts anteriores
function destruirCharts(){ Object.values(_charts).forEach(c=>{try{c.destroy()}catch(e){}}); _charts={}; }

async function carregar(){
  destruirCharts();
  document.getElementById("dash").innerHTML=`<div style="padding:40px;text-align:center"><div class="spin"></div><div class="muted" style="margin-top:10px">Carregando analytics…</div></div>`;
  try{
    const {de,ate}=getPeriodoDates();
    const r=await fetch(`${B}/api/analytics?de=${de}&ate=${ate}`);
    const d=await r.json();
    if(d.erro){ document.getElementById("dash").innerHTML=`<div class="err" style="margin:20px">Erro: ${esc(d.erro)}</div>`; return; }
    document.getElementById("lastUpdate").textContent="Atualizado: "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    renderDash(d);
  }catch(e){ document.getElementById("dash").innerHTML=`<div class="err" style="margin:20px">Erro de conexão</div>`; }
}

function renderDash(d){
  const {operacional:op,financeiro:fin,funcionarios:funcs,graficos:graf}=d;
  // monta o ranking de funcionários como tabela
  const topFunc=funcs.slice(0,10);
  const maxSep=Math.max(...funcs.map(f=>f.pedidosSeparados),1);

  const fRows=topFunc.length?topFunc.map((f,i)=>`<tr>
    <td><span style="color:#9a95c9;margin-right:6px">${i+1}</span><b>${esc(f.nome)}</b></td>
    <td>${f.pedidosSeparados}<div class="bar-inline" style="width:${Math.round(f.pedidosSeparados/maxSep*80)}px"></div></td>
    <td>${min2str(f.tempoMedioSep)}</td>
    <td>${f.conferidos}</td>
    <td>${f.pagamentosRecebidos} <span class="muted">${brl(f.valorRecebido)}</span></td>
    <td><span class="badge-sm" style="background:${f.taxaPendencia>30?'#3a2030':'#183a2a'};color:${f.taxaPendencia>30?'#ffbfce':'#a8f0c8'}">${f.taxaPendencia}%</span></td>
    <td class="muted">${f.acrescimos||0}➕ ${f.retiradas||0}➖ ${f.pedidosAssumidos||0}⚡</td>
  </tr>`).join("")
  :`<tr><td colspan="7" class="muted" style="text-align:center;padding:20px">Nenhum dado no período</td></tr>`;

  // gráfico de formas de pagamento
  const formaLabels=Object.keys(fin.porForma);
  const formaValues=Object.values(fin.porForma);
  const cores=["#FF0082","#00aaff","#2f9e6b","#ffd23f","#d400ff","#ff8c00","#1f7f2a","#b8860b"];

  // gráfico pedidos por hora
  const horaLabels=Array.from({length:24},(_,i)=>`${String(i).padStart(2,"0")}h`);

  // gráfico pedidos por dia
  const diasKeys=Object.keys(graf.porDia||{}).sort();
  const diasVals=diasKeys.map(k=>graf.porDia[k]);
  const diasLabels=diasKeys.map(k=>{ const [y,m,d]=k.split("-"); return `${d}/${m}`; });

  // status dos pedidos
  const statusLabels=Object.keys(op.porStatus);
  const statusVals=Object.values(op.porStatus);
  const statusCores=statusLabels.map((_,i)=>cores[i%cores.length]);

  document.getElementById("dash").innerHTML=`
  <!-- KPIs operacionais -->
  <div>
    <div class="sec-title">📦 Operacional</div>
    <div class="kpi-grid">
      <div class="kpi" style="--accent:#00aaff"><span class="ic">📦</span><div class="lb">Total de pedidos</div><div class="vl">${op.totalPedidos}</div><div class="sub">no período</div></div>
      <div class="kpi" style="--accent:#ffd23f"><span class="ic">💰</span><div class="lb">Ticket médio</div><div class="vl">${brl(op.ticketMedio)}</div><div class="sub">por pedido</div></div>
      <div class="kpi" style="--accent:#d400ff"><span class="ic">⚠️</span><div class="lb">Com pendências</div><div class="vl">${op.comPendencia}</div><div class="sub">taxa: ${op.taxaPendencia}</div></div>
      <div class="kpi" style="--accent:#2f9e6b"><span class="ic">⏱</span><div class="lb">Tempo médio fluxo</div><div class="vl">${min2str(op.tempoMedioFluxo)}</div><div class="sub">totem → verificado</div></div>
    </div>
  </div>

  <!-- KPIs financeiros -->
  <div>
    <div class="sec-title">💰 Financeiro</div>
    <div class="kpi-grid">
      <div class="kpi" style="--accent:#2f9e6b"><span class="ic">✅</span><div class="lb">Total recebido</div><div class="vl" style="font-size:20px">${brl(fin.totalRecebido)}</div><div class="sub">no período</div></div>
      <div class="kpi" style="--accent:#e5563f"><span class="ic">⏳</span><div class="lb">Pendente receber</div><div class="vl" style="font-size:20px">${brl(fin.totalPendente)}</div><div class="sub">pedidos em aberto</div></div>
      ${Object.entries(fin.porForma).slice(0,4).map(([k,v])=>`
        <div class="kpi" style="--accent:#ffd23f"><div class="lb">${esc(k)}</div><div class="vl" style="font-size:18px">${brl(v)}</div><div class="sub">forma de pagamento</div></div>`).join("")}
    </div>
  </div>

  <!-- Gráficos -->
  <div>
    <div class="sec-title">📊 Gráficos</div>
    <div class="graf-grid">
      <div class="graf-box"><h4>📅 Pedidos por dia</h4><canvas id="cDia"></canvas></div>
      <div class="graf-box"><h4>🕐 Pedidos por hora do dia</h4><canvas id="cHora"></canvas></div>
      <div class="graf-box"><h4>💳 Formas de pagamento</h4><canvas id="cForma"></canvas></div>
      <div class="graf-box"><h4>📦 Pedidos por status</h4><canvas id="cStatus"></canvas></div>
    </div>
  </div>

  <!-- Funcionários -->
  <div>
    <div class="sec-title">👥 Funcionários</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:auto">
      <table class="ftable">
        <thead><tr>
          <th>Funcionário</th><th>Separações</th><th>Tempo médio sep.</th>
          <th>Conferências</th><th>Pagamentos</th><th>Taxa pendência</th><th>Outros</th>
        </tr></thead>
        <tbody>${fRows}</tbody>
      </table>
    </div>
  </div>`;

  // renderizar os charts após o DOM estar pronto
  setTimeout(()=>{
    const cfg=(type,labels,datasets,opts={})=>({type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{...opts.legend}},scales:opts.scales||{}}});

    // pedidos por dia
    const cDia=document.getElementById("cDia");
    if(cDia&&diasKeys.length) _charts.dia=new Chart(cDia,cfg("bar",diasLabels,[{label:"Pedidos",data:diasVals,backgroundColor:"rgba(255,0,130,.6)",borderColor:"#FF0082",borderWidth:1}],{legend:{display:false},scales:{x:{ticks:{color:"#9a95c9",font:{size:10}}},y:{ticks:{color:"#9a95c9"},grid:{color:"#2c2660"}}}}));

    // pedidos por hora
    const cHora=document.getElementById("cHora");
    if(cHora) _charts.hora=new Chart(cHora,cfg("line",horaLabels,[{label:"Pedidos",data:graf.porHora,borderColor:"#00aaff",backgroundColor:"rgba(0,170,255,.1)",fill:true,tension:.4,pointRadius:3}],{legend:{display:false},scales:{x:{ticks:{color:"#9a95c9",font:{size:9}}},y:{ticks:{color:"#9a95c9"},grid:{color:"#2c2660"}}}}));

    // formas de pagamento
    const cForma=document.getElementById("cForma");
    if(cForma&&formaLabels.length) _charts.forma=new Chart(cForma,{type:"doughnut",data:{labels:formaLabels,datasets:[{data:formaValues,backgroundColor:cores.slice(0,formaLabels.length),borderWidth:2,borderColor:"#151233"}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#9a95c9",font:{size:10},padding:8}}}}});

    // status dos pedidos
    const cStatus=document.getElementById("cStatus");
    if(cStatus&&statusLabels.length) _charts.status=new Chart(cStatus,{type:"bar",data:{labels:statusLabels,datasets:[{data:statusVals,backgroundColor:statusCores,borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#9a95c9",font:{size:9},maxRotation:30}},y:{ticks:{color:"#9a95c9"},grid:{color:"#2c2660"}}}}});
  },100);
}

carregar();
setInterval(()=>{ if(_periodo==="hoje") carregar(); },60000);
</script>
</body>
</html>
