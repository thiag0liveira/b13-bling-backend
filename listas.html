<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B13 — Gerenciador de Listas</title>
<style>
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
  :root{--indigo:#262366;--indigo2:#2b2870;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
  body{background:var(--bg);color:#fff;min-height:100vh}
  #app{max-width:1100px;margin:0 auto}
  .top{background:linear-gradient(180deg,var(--indigo2),var(--indigo));border-bottom:3px solid var(--mag);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
  .top img{height:40px}.top .t{font-weight:900;font-size:17px}.top .sp{flex:1}
  .btn{border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px;padding:9px 14px;color:#fff;touch-action:manipulation}
  .btn-mag{background:var(--mag)}.btn-out{background:transparent;border:2px solid #514c96}
  .btn-ghost{background:#1c1846}.btn-grn{background:#2f9e6b}.btn-red{background:#c0392b}
  .btn:disabled{opacity:.4}
  /* abas de listas */
  .tabs{display:flex;gap:0;overflow-x:auto;background:var(--indigo);border-bottom:1px solid var(--border);padding:0 12px}
  .tab{padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;color:#9a95c9}
  .tab.on{color:#fff;border-bottom-color:var(--mag)}
  .tab-add{padding:10px 14px;font-size:18px;cursor:pointer;color:#514c96}
  .tab-add:hover{color:var(--mag)}
  /* toolbar */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#0d0b1e;border-bottom:1px solid var(--border);align-items:center}
  .lnome{font-weight:900;font-size:15px;border:none;background:transparent;color:#fff;min-width:120px;max-width:200px}
  .lnome:focus{outline:1px solid var(--mag);border-radius:4px}
  /* conteúdo da lista */
  .wrap{padding:14px}
  /* busca de produtos */
  .buscabox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px}
  .buscabox input{width:100%;padding:10px;border-radius:8px;border:1px solid #514c96;background:#0f0d24;color:#fff;font-size:14px}
  .buscabox input:focus{outline:none;border-color:var(--mag)}
  .res-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
  .res-item:last-child{border-bottom:none}
  /* tabela de produtos da lista */
  .ptable{width:100%;border-collapse:collapse;font-size:13px}
  .ptable th{background:#141031;padding:8px 10px;text-align:left;font-size:11px;color:#9a95c9;font-weight:700;border-bottom:1px solid var(--border)}
  .ptable td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  .ptable tr:hover td{background:rgba(255,255,255,.03)}
  .ptable input[type=number],.ptable input[type=text]{background:#0f0d24;border:1px solid #514c96;border-radius:6px;color:#fff;padding:5px 8px;font-size:12px;width:80px}
  .ptable input[type=text]{width:140px}
  .chip{display:inline-block;background:#1c1846;border:1px solid var(--mag);border-radius:6px;font-size:10px;font-weight:800;padding:2px 7px;margin:2px}
  .muted{color:#9a95c9;font-size:12px}
  .ok{background:#183a2a;color:#a8f0c8;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;margin:8px 0}
  .err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;margin:8px 0}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
  .mbox{background:#1c1846;border:1px solid #3a357f;border-radius:14px;max-width:520px;width:100%;padding:18px;max-height:85vh;overflow:auto}
  .mbox h3{margin-bottom:12px;font-size:16px}
</style>
<script src="/nav.js"></script>
<style>
  body.b13nav-open{ overflow:hidden }
  @media(min-width:900px){
    #b13nav{transform:translateX(0%) !important}
    #b13navOverlay{display:none !important}
    button[onclick="b13ToggleNav()"]{display:none !important}
    body > *:not(#b13nav):not([onclick="b13ToggleNav()"]):not(#b13navOverlay){ margin-left:200px }
  }
</style>
</head>
<body><script>
  (function(){
    if(!b13RequireLogin()) return;
    document.addEventListener("DOMContentLoaded",function(){
      const nav=document.createElement("div");
      nav.innerHTML=b13RenderNav("/listas");
      document.body.insertBefore(nav,document.body.firstChild);
    });
  })();
</script>
<div id="app">
  <div class="top"><img id="logoImg"><div class="t">Gerenciador de Listas</div><div class="sp"></div>
    <button class="btn btn-ghost" onclick="importarTabela()" title="Importar produtos da tabela de preços publicada">📥 Importar tabela</button>
    <button class="btn btn-ghost" onclick="salvar()">💾 Salvar</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="toolbar" id="toolbar"></div>
  <div class="wrap" id="wrap"></div>
</div>
<div id="modal" style="display:none" class="modal" onclick="if(event.target===this)fecharModal()">
  <div class="mbox" id="mbox"></div>
</div>
<script>
const BACKEND=(location.protocol.indexOf("http")===0)?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
document.getElementById("logoImg").src=LOGO;

// ---- estado ----
let LISTAS=[], ABA=0, buscaTimer=null, buscaRes=[], msg="";
const nid=(()=>{ let i=Date.now(); return ()=>"n"+(i++); })();
const brl=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function novaLista(nome){ return {id:nid(),nome:nome||"NOVA LISTA",itens:[]}; }
function novoItem(){ return {id:nid(),codigo:"",nomeProd:"",nomeBling:"",qtdCx:1,preco:0,precoBling:0,tipo:"lista"}; }
// tipo: "lista" = só lista de preços | "kit" = criar kit/fardo no Bling

// ---- persistência ----
function salvar(){ try{ localStorage.setItem("b13listas",JSON.stringify(LISTAS)); }catch(e){} render(); }
function carregar(){ try{ const d=localStorage.getItem("b13listas"); if(d) LISTAS=JSON.parse(d); }catch(e){} if(!LISTAS.length) LISTAS=[novaLista("VAREJO")]; }

// ---- render principal ----
function render(){
  renderTabs();
  const lista=LISTAS[ABA];
  if(!lista){ document.getElementById("toolbar").innerHTML=""; document.getElementById("wrap").innerHTML=""; return; }
  renderToolbar(lista);
  renderWrap(lista);
}

function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML=LISTAS.map((l,i)=>`<div class="tab ${i===ABA?'on':''}" onclick="ABA=${i};render()">${esc(l.nome)}</div>`).join("")+
    `<div class="tab-add" onclick="addLista()" title="Nova lista">＋</div>`;
}

function renderToolbar(lista){
  document.getElementById("toolbar").innerHTML=`
    <input class="lnome" value="${esc(lista.nome)}" onchange="lista.nome=this.value;salvar()" title="Nome da lista">
    <button class="btn btn-out" onclick="abrirBusca()">🔍 Adicionar produto</button>
    <button class="btn btn-out" onclick="exportCSV()">📄 Exportar CSV (Bling)</button>
    <button class="btn btn-grn" onclick="criarKits()">⚙️ Criar kits no Bling</button>
    <button class="btn btn-red" style="margin-left:auto" onclick="deletarLista()">🗑 Excluir lista</button>
    <div id="toolMsg" style="width:100%">${msg}</div>`;
  msg="";
}

function renderWrap(lista){
  const itens=lista.itens;
  if(!itens.length){
    document.getElementById("wrap").innerHTML=`<div class="muted" style="padding:20px;text-align:center">
      Nenhum produto nesta lista.<br><br>
      <button class="btn btn-mag" onclick="abrirBusca()">+ Adicionar produto</button>
      <button class="btn btn-ghost" style="margin-left:8px" onclick="importarTabela()">📥 Importar da tabela</button>
    </div>`; return;
  }
  const rows=itens.map((it,ix)=>`<tr>
    <td><div style="font-weight:700">${esc(it.nomeProd)}</div><div class="muted">${it.codigo?`#${esc(it.codigo)}`:""}</div></td>
    <td><span class="chip">${it.tipo==="kit"?"📦 Kit/Fardo":"📋 Lista"}</span>
      <select style="background:#0f0d24;border:1px solid #514c96;border-radius:6px;color:#fff;padding:4px;font-size:11px;margin-top:3px" onchange="it.tipo=this.value;salvar()">
        <option value="lista" ${it.tipo==="lista"?"selected":""}>Lista de preços</option>
        <option value="kit" ${it.tipo==="kit"?"selected":""}>Kit/Fardo</option>
      </select></td>
    <td><input type="number" min="1" value="${it.qtdCx}" onchange="it.qtdCx=+this.value;it.preco=+(it.precoBling*it.qtdCx).toFixed(2);salvar()" title="Unidades por caixa/fardo"></td>
    <td><input type="number" min="0" step="0.01" value="${it.preco}" onchange="it.preco=+this.value;salvar()" title="Preço nesta lista"></td>
    <td class="muted">${it.precoBling?brl(it.precoBling):"-"}</td>
    <td><button class="btn btn-red" style="padding:5px 9px;font-size:12px" onclick="removerItem(${ix})">✕</button></td>
  </tr>`).join("");
  document.getElementById("wrap").innerHTML=`
    <table class="ptable">
      <thead><tr>
        <th>Produto</th><th>Tipo</th><th>Qtd/cx</th><th>Preço lista</th><th>Preço Bling</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn btn-out" onclick="abrirBusca()">+ Adicionar produto</button>
    </div>`;
}

// ---- ações ----
function addLista(){ const n=prompt("Nome da nova lista:","NOVA LISTA"); if(!n)return; LISTAS.push(novaLista(n)); ABA=LISTAS.length-1; salvar(); }
function deletarLista(){ if(LISTAS.length<=1){alert("Precisa ter ao menos uma lista.");return;} if(!confirm(`Excluir a lista "${LISTAS[ABA].nome}"?`))return; LISTAS.splice(ABA,1); ABA=Math.max(0,ABA-1); salvar(); }
function removerItem(ix){ LISTAS[ABA].itens.splice(ix,1); salvar(); }

// ---- busca de produto ----
function abrirBusca(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<h3>Adicionar produto</h3>
    <input id="buscaInp" placeholder="buscar produto no Bling..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #514c96;background:#0f0d24;color:#fff;font-size:14px;margin-bottom:10px" oninput="buscarProd(this.value)">
    <div id="buscaRes"><div class="muted">Digite para buscar…</div></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="fecharModal()">Fechar</button>`;
  setTimeout(()=>document.getElementById("buscaInp")?.focus(),100);
}
function fecharModal(){ document.getElementById("modal").style.display="none"; }

function buscarProd(term){
  clearTimeout(buscaTimer);
  const box=document.getElementById("buscaRes"); if(!box)return;
  if((term||"").trim().length<2){ box.innerHTML="<div class='muted'>Digite ao menos 2 letras…</div>"; return; }
  box.innerHTML="<div class='muted'>Buscando…</div>";
  buscaTimer=setTimeout(async()=>{
    try{
      const r=await fetch(`${BACKEND}/api/buscar-atacado?nome=${encodeURIComponent(term.trim())}`);
      const j=await r.json(); const lista=j.data||[];
      const b=document.getElementById("buscaRes"); if(!b)return;
      if(!lista.length){ b.innerHTML="<div class='muted'>Nenhum resultado.</div>"; return; }
      b.innerHTML="";
      lista.forEach(p=>{
        const div=document.createElement("div"); div.className="res-item";
        div.innerHTML=`<div><b>${esc(p.nome)}</b><br><span class="muted">#${esc(p.codigo)} · est ${p.estoque??'?'} · ${brl(p.precoBling||p.preco||0)}</span></div>`;
        const btn=document.createElement("button"); btn.className="btn btn-mag"; btn.style.flexShrink="0";
        btn.textContent="+ Adicionar"; btn.addEventListener("click",()=>{ addItem(p); });
        div.appendChild(btn); b.appendChild(div);
      });
    }catch(e){ const b=document.getElementById("buscaRes"); if(b) b.innerHTML="<div class='muted'>Erro ao buscar.</div>"; }
  },400);
}

function addItem(p){
  const lista=LISTAS[ABA]; if(!lista)return;
  if(lista.itens.some(it=>it.codigo===String(p.codigo))){ alert("Este produto já está na lista."); return; }
  lista.itens.push({id:nid(),codigo:String(p.codigo),nomeProd:p.nome,nomeBling:p.nome,qtdCx:1,preco:+(p.precoBling||p.preco||0).toFixed(2),precoBling:+(p.precoBling||p.preco||0),tipo:"lista"});
  salvar();
  // feedback visual
  const btn=event.target; if(btn){ btn.textContent="✅"; btn.disabled=true; }
}

// ---- importar da tabela publicada ----
async function importarTabela(){
  if(!confirm("Importar todos os produtos da tabela de preços publicada para esta lista?\nProdutos já existentes serão ignorados.\n\nVai buscar o preço real de cada produto no Bling (pode demorar).")) return;
  try{
    const r=await fetch(`${BACKEND}/api/catalogo`); const j=await r.json();
    const lista=LISTAS[ABA]; let skip=0;
    const novos=[];
    (j.categorias||[]).forEach(c=>(c.produtos||[]).forEach(p=>{
      (p.sabores||[]).forEach(s=>{
        if(lista.itens.some(it=>it.codigo===String(s.codigo))){ skip++; return; }
        novos.push({id:nid(),codigo:String(s.codigo),nomeProd:s.nome||p.nome,nomeBling:s.nome||p.nome,qtdCx:p.un||1,preco:+p.preco.toFixed(2),precoBling:0,tipo:"lista"});
      });
    }));
    if(!novos.length){ msg=`<div class="ok">Nenhum produto novo. ${skip} já existiam.</div>`; render(); return; }

    // mostra progresso na tela em tempo real
    const total=novos.length;
    const mostrarProg=(i)=>{
      document.getElementById("toolMsg").innerHTML=
        `<div style="background:#1c1846;border-radius:8px;padding:8px 12px;font-size:12px;margin-top:4px">
          ⏳ Buscando preços no Bling… <b>${i}/${total}</b>
          <div style="background:#0f0d24;border-radius:4px;height:6px;margin-top:6px">
            <div style="background:var(--mag);height:6px;border-radius:4px;width:${Math.round(i/total*100)}%;transition:.3s"></div>
          </div>
        </div>`;
    };

    mostrarProg(0);
    for(let i=0;i<novos.length;i++){
      const it=novos[i];
      try{
        // busca pelo código exato — retorna precoBling (preço do cadastro do Bling)
        const r2=await fetch(`${BACKEND}/api/preco-codigo?codigo=${encodeURIComponent(it.codigo)}`);
        const j2=await r2.json();
        if(j2.preco>0) it.precoBling=+Number(j2.preco).toFixed(2);
      }catch(e){}
      mostrarProg(i+1);
      if(i>0 && i%3===0) await new Promise(r=>setTimeout(r,400));
    }

    lista.itens.push(...novos);
    msg=`<div class="ok">✅ ${novos.length} produto(s) importado(s) com preço do Bling!${skip?` ${skip} já existiam.`:""}</div>`;
    salvar();
  }catch(e){ msg=`<div class="err">Erro: ${e.message}</div>`; render(); }
}

// ---- exportar CSV ----
function exportCSV(){
  const lista=LISTAS[ABA]; if(!lista?.itens.length){ alert("Lista vazia."); return; }
  const linhas=[["Nome lista","SKU","Nome produto","Preço"]];
  lista.itens.forEach(it=>{
    if(!it.codigo){ return; }
    linhas.push([lista.nome, it.codigo, it.nomeBling||it.nomeProd, Number(it.preco).toFixed(2).replace(".",",")]);
  });
  if(linhas.length<=1){ alert("Nenhum produto com código vinculado."); return; }
  const csv=linhas.map(l=>l.map(c=>`"${(c||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.download=`lista_${lista.nome.replace(/\s+/g,"_")}.csv`; a.href=URL.createObjectURL(blob); a.click();
  msg=`<div class="ok">✅ CSV exportado com ${linhas.length-1} produto(s).</div>`;
  render();
}

// ---- criar kits no Bling ----
async function criarKits(){
  const lista=LISTAS[ABA];
  const kits=lista?.itens.filter(it=>it.tipo==="kit"&&it.codigo&&it.qtdCx>1);
  if(!kits?.length){ alert("Nenhum item marcado como 'Kit/Fardo' com quantidade > 1.\nMude o tipo do produto para 'Kit/Fardo' e defina a quantidade por caixa."); return; }
  if(!confirm(`Criar ${kits.length} kit(s)/fardo(s) no Bling?\n\n${kits.map(k=>`• ${k.nomeProd} C/${k.qtdCx}`).join("\n")}`)) return;

  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<h3>⚙️ Criando kits no Bling…</h3><div id="kitLog"></div>`;

  const log=document.getElementById("kitLog");
  let ok=0, erros=0;
  for(const kit of kits){
    const nomeKit=`${kit.nomeProd} C/${kit.qtdCx}`;
    log.innerHTML+=`<div class="muted">Criando ${esc(nomeKit)}…</div>`;
    try{
      // 1) criar o produto pai (kit)
      const rProd=await fetch(`${BACKEND}/api/raw`,{method:"GET"}); // só pra testar conexão
      const resProd=await fetch(`${BACKEND}/api/raw?path=/produtos`,{method:"GET"});
      // POST produto kit
      const bodyProd={nome:nomeKit,codigo:`KIT-${kit.codigo}-${kit.qtdCx}`,preco:+kit.preco.toFixed(2),tipo:"K",situacao:"A"};
      const rK=await fetch(`${BACKEND}/api/raw?path=/produtos`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(bodyProd)});
      // Note: /api/raw só faz GET — vou usar endpoint dedicado
      throw new Error("Use o endpoint dedicado (ver aviso abaixo)");
    }catch(e){
      erros++;
      log.innerHTML+=`<div class="err">✗ ${esc(nomeKit)}: ${esc(e.message)}</div>`;
    }
  }
  log.innerHTML+=`<hr style="border-color:var(--border);margin:10px 0"><div>${ok} criado(s) · ${erros} erro(s)</div>
    <div class="err" style="margin-top:8px">⚠️ A criação de kits via API v3 do Bling requer endpoint dedicado no backend. Vou implementar na próxima etapa.</div>
    <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="fecharModal()">Fechar</button>`;
}

// ---- init ----
carregar(); ABA=0; render();
</script>
</body>
</html>
