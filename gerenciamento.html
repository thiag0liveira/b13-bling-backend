<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B13 — Gerenciamento</title>
<style>
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
  :root{--indigo:#262366;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
  body{background:var(--bg);color:#fff;min-height:100vh}
  #app{max-width:1100px;margin:0 auto}
  .top{background:linear-gradient(180deg,#2b2870,var(--indigo));border-bottom:3px solid var(--mag);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .top img{height:38px}.top .t{font-weight:900;font-size:16px}.top .sp{flex:1}
  .btn{border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px;padding:9px 14px;color:#fff;touch-action:manipulation}
  .btn-mag{background:var(--mag)}.btn-out{background:transparent;border:2px solid #514c96}
  .btn-ghost{background:#1c1846}.btn-grn{background:#2f9e6b}.btn-red{background:#c0392b}
  .btn-yellow{background:#b8860b}
  .btn:disabled{opacity:.4}
  /* colunas kanban */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px}
  @media(max-width:800px){.kanban{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.kanban{grid-template-columns:1fr}}
  .col{background:#0d0b1e;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .col-head{padding:10px 12px;font-weight:900;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
  .col-head .cnt{background:var(--mag);color:#fff;border-radius:999px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
  .col-body{padding:8px;min-height:120px;max-height:calc(100vh - 160px);overflow-y:auto}
  /* cards de pedido */
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px}
  .pcard .num{font-weight:900;font-size:14px;margin-bottom:2px}
  .pcard .cli{color:#9a95c9;font-size:12px;margin-bottom:6px}
  .pcard .tot{color:#ffd23f;font-weight:800;margin-bottom:6px}
  .pcard .sep{background:#00aaff22;border:1px solid #00aaff;border-radius:6px;padding:4px 8px;font-size:11px;color:#00aaff;margin-bottom:6px}
  .pcard.acrescimo{border-color:#ff8c00}
  .pcard .new-badge{background:#ff8c0022;border:1px solid #ff8c00;border-radius:6px;padding:3px 8px;font-size:11px;color:#ff8c00;margin-bottom:6px;font-weight:800}
  .pcard .acr-itens{font-size:11px;color:#ffd23f;margin-bottom:6px}
  .badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;color:#111}
  .muted{color:#9a95c9;font-size:12px}
  .ok{background:#183a2a;color:#a8f0c8;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700}
  /* login */
  .login-wrap{max-width:380px;margin:12vh auto;text-align:center;padding:16px}
  .login-wrap input{width:100%;padding:13px;border-radius:10px;border:2px solid #514c96;background:var(--card);color:#fff;font-size:16px;margin-bottom:10px}
  .err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:8px 12px;font-size:13px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
const AGUARDANDO=818795, EM_SEP=817963, VERIFICADO=24, PENDENCIAS=819227;
const brl=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const dataBR=d=>{if(!d)return"";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}`:d;};
const tempo=ms=>{const m=Math.floor(ms/60000);return m<60?`${m}min`:`${Math.floor(m/60)}h${m%60}min`;};

let logado=false, func=null, pedidos=[], seps={}, acrs=[], mapSit={}, timer=null;
try{ if(typeof b13GetSession==="function"){ const sess=b13GetSession(); if(sess){logado=true;func=sess;} } }catch(e){}

async function login(){
  const senha=document.getElementById("pwInp").value;
  try{
    const r=await fetch(B+"/api/funcionarios/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:document.getElementById("loginInp")?.value?.trim()||"",senha,nivel:"gerente"})});
    const j=await r.json();
    if(r.ok&&j.ok){ logado=true; func=j.funcionario; try{if(typeof b13SetSession==="function") b13SetSession(func);}catch(e){}
      iniciar();
    } else { document.getElementById("pwErr").textContent=j.erro||"Senha incorreta."; }
  }catch(e){ document.getElementById("pwErr").textContent="Erro de conexão."; }
}
function sair(){ logado=false; func=null; if(typeof b13ClearSession==="function") b13ClearSession(); if(timer)clearInterval(timer); location.href="/login"; }

async function iniciar(){
  // carregar situações
  try{ const r=await fetch(B+"/api/situacoes?modulo=98310"); const j=await r.json();
    mapSit={}; (j.data||[]).forEach(s=>mapSit[s.id]={nome:s.nome,cor:s.cor||"#cbcbcb"}); }catch(e){}
  await carregar();
  if(timer) clearInterval(timer);
  timer=setInterval(carregar, 8000); // atualiza a cada 8s
}

async function carregar(){
  try{
    const [rPed,rSep,rAcr]=await Promise.all([
      fetch(B+"/api/pedidos?limite=100").then(r=>r.json()),
      fetch(B+"/api/separacoes").then(r=>r.json()),
      fetch(B+"/api/acrescimos").then(r=>r.json()),
    ]);
    pedidos=rPed.data||[];
    seps=rSep.data||{};
    acrs=rAcr.data||[];
  }catch(e){}
  render();
}

function render(){
  const app=document.getElementById("app");
  const top=`<div class="top"><img src="${LOGO}" onerror="this.style.display='none'">
    <div class="t">Gerenciamento</div><div class="sp"></div>
    ${logado?`<span class="muted">👤 ${esc(func?.nome||"")}</span>
      <a href="/funcionarios" class="btn btn-ghost" style="text-decoration:none">👥 Funcionários</a>
      <a href="/gestao" class="btn btn-out" style="text-decoration:none">← Gestão</a>
      <button class="btn btn-ghost" onclick="sair()">Sair</button>`:""}
  </div>`;

  if(!logado){
    app.innerHTML=top+`<div class="login-wrap">
      <div style="font-size:48px;margin-bottom:10px">🏭</div>
      <h2 style="margin-bottom:6px">Gerenciamento</h2>
      <p class="muted" style="margin-bottom:16px">Acesso para gerentes e administradores</p>
      <input id="loginInp" placeholder="Login" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')login()">
      <input id="pwInp" type="password" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-mag" style="width:100%" onclick="login()">Entrar</button>
      <div id="pwErr" class="muted" style="margin-top:8px"></div>
    </div>`; return;
  }

  // separar pedidos por coluna
  const aguardando=pedidos.filter(p=>p.situacao?.id===AGUARDANDO);
  const emSep=pedidos.filter(p=>p.situacao?.id===EM_SEP);
  const pendentes=pedidos.filter(p=>p.situacao?.id===PENDENCIAS);
  const verificados=pedidos.filter(p=>p.situacao?.id===VERIFICADO).slice(0,10);
  const acrsMap={}; acrs.filter(a=>a.status==="pendente").forEach(a=>acrsMap[String(a.pedidoId)]=a);

  app.innerHTML=top+`<div class="kanban">
    ${coluna("⏳ Aguardando separação",aguardando,"aguardando",acrsMap)}
    ${coluna("🔄 Em separação",emSep,"em_sep",acrsMap)}
    ${coluna("⚠️ Pendências",pendentes,"pendencias",acrsMap)}
    ${coluna("✅ Verificados",verificados,"verificados",acrsMap)}
  </div>`;
  // setar imagem logo
  document.querySelectorAll(".top img").forEach(i=>i.src=LOGO);
}

function coluna(titulo,lista,tipo,acrsMap){
  const cards=lista.map(p=>{
    const sep=seps[String(p.id)];
    const acr=acrsMap[String(p.id)];
    const tempoSep=sep?tempo(Date.now()-sep.inicio):"";
    return `<div class="pcard ${acr?'acrescimo':''}">
      <div class="num">Pedido ${esc(p.numero||p.id)}</div>
      <div class="cli">${esc(p.contato?.nome||"—")} · ${dataBR(p.data)}</div>
      <div class="tot">${brl(p.total)}</div>
      ${sep?`<div class="sep">🔧 ${esc(sep.funcionarioNome)} · ${tempoSep}</div>`:""}
      ${acr?`<div class="new-badge">🆕 Acréscimo</div>
        <div class="acr-itens">${(acr.itensNovos||[]).map(i=>`+ ${esc(i.descricao)} x${i.quantidade}`).join("<br>")}</div>`:""}
      ${botoesCard(p,tipo,acr)}
    </div>`;
  }).join("")||`<div class="muted" style="padding:12px;text-align:center">Nenhum pedido</div>`;
  return `<div class="col">
    <div class="col-head">${titulo}<span class="cnt">${lista.length}</span></div>
    <div class="col-body">${cards}</div>
  </div>`;
}

function botoesCard(p,tipo,acr){
  if(tipo==="aguardando") return `<button class="btn btn-grn" style="width:100%;margin-top:4px" onclick="enviarSep(${p.id})">▶ Enviar pra separação</button>`;
  if(tipo==="em_sep") return `<button class="btn btn-ghost" style="width:100%;margin-top:4px;font-size:11px" onclick="verPedido(${p.id})">Ver detalhes</button>`;
  if(tipo==="pendencias") return `<div style="display:flex;gap:6px;margin-top:4px">
    <button class="btn btn-yellow" style="flex:1;font-size:11px" onclick="verPedido(${p.id})">Ver</button>
    <button class="btn btn-grn" style="flex:1;font-size:11px" onclick="resolverPend(${p.id})">✅ Resolver</button>
  </div>`;
  if(tipo==="verificados") return `<div class="muted" style="margin-top:4px">✅ Concluído</div>`;
  return "";
}

async function enviarSep(id){
  try{
    await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:EM_SEP})});
    await carregar();
  }catch(e){ alert("Erro ao enviar pra separação"); }
}

async function resolverPend(id){
  if(!confirm("Marcar como Verificado?")) return;
  try{
    await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:VERIFICADO})});
    await fetch(B+"/api/pendencias/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"resolvido"})});
    await carregar();
  }catch(e){}
}

async function verPedido(id){
  window.open("/gestao#pedido-"+id,"_blank");
}

// init
document.getElementById("app").innerHTML=`<div class="top"><img src="${LOGO}"></div>`;
if(logado) iniciar(); else render();
</script>
</body>
</html>
